<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KBC</title>
    <style>
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .hide {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="divStart">
            <button onclick="doHide(divstart);doShow(divgame)">Start</button>

        </div>
        <div id="divGame" class="hide">
            <h1>Game</h1>

        </div>
    </div>
    <script>
        const divstart = document.querySelector("#divStart");
        const divgame = document.querySelector("#divGame");
        function doHide(element) {
            element.classList.add("hide");

        }
        function doShow(element) {
            element.classList.remove("hide");

        }
    </script>
</body>

</html>
